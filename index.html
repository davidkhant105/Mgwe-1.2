<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mgwe's collections</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom CSS for animations and scrollbars -->
    <style>
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade-in { 
            animation: fadeIn 0.4s ease-out forwards; 
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>

    <!-- Load React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-zinc-950 text-gray-100 font-sans selection:bg-pink-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ICONS (Replacing lucide-react for standalone usage)
        // ==========================================
        const ShoppingBag = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
        const Menu = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
        const X = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const ArrowLeft = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
        const Send = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>;
        const Scissors = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" x2="8.12" y1="4" y2="15.88"/><line x1="14.47" x2="20" y1="14.48" y2="20"/><line x1="8.12" x2="12" y1="8.12" y2="12"/></svg>;
        const User = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const MapPin = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Phone = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
        const CheckCircle = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
        const ChevronRight = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const MessageSquare = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;

        // ==========================================
        // CONFIGURATION
        // ==========================================
        const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxevTgxoP4W-NiFPwlvQtby0kpzvXXVs_6Sc7BgrY7J61tFM4agLeVBNC6Y_7wpdmATLA/exec"; 

        const DEFAULT_BANNERS = [
        { id: 1, text: "Welcome to mgwe's collections", subtext: "Discover Modern Elegance" },
        { id: 2, text: "Custom Tailoring Available", subtext: "Get your perfect fit with our AI Consultant" }
        ];

        const DEFAULT_PRODUCTS = [
        { id: 'm1', category: 'Men Wears', name: 'Classic Black Suit', price: 150000, image: 'https://cdn.shopify.com/s/files/1/1025/3059/files/ClassicBlack_Front_Inside_1500x2000_crop_center.jpg?v=1764897485' },
        { id: 'm2', category: 'Men Wears', name: 'Pink Oxford Shirt', price: 45000, image: 'https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?auto=format&fit=crop&w=600&q=80' },
        { id: 'm3', category: 'Men Wears', name: 'Dark Denim Jeans', price: 60000, image: 'https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&w=600&q=80' },
        { id: 'w1', category: 'Women Wears', name: 'Elegant Evening Gown', price: 250000, image: 'https://images.unsplash.com/photo-1566150905458-1bf1fc113f0d?auto=format&fit=crop&w=600&q=80' },
        { id: 'w2', category: 'Women Wears', name: 'Pink Silk Blouse', price: 55000, image: 'https://images.unsplash.com/photo-1551163943-3f6a855d1153?auto=format&fit=crop&w=600&q=80' },
        { id: 'w3', category: 'Women Wears', name: 'Black Pleated Skirt', price: 40000, image: 'https://images.unsplash.com/photo-1582142306909-195724d33ffc?auto=format&fit=crop&w=600&q=80' },
        ];

        const FORMAT_PRICE = (price) => new Intl.NumberFormat('en-US').format(price) + ' MMK';

        function App() {
            const [view, setView] = useState('home'); 
            const [cart, setCart] = useState([]);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isScrolled, setIsScrolled] = useState(false);

            const [products, setProducts] = useState(DEFAULT_PRODUCTS);
            const [banners, setBanners] = useState(DEFAULT_BANNERS);
            const [loadingData, setLoadingData] = useState(false);

            useEffect(() => {
                const fetchData = async () => {
                if (!GOOGLE_WEB_APP_URL) return;
                setLoadingData(true);
                try {
                    const response = await fetch(`${GOOGLE_WEB_APP_URL}?action=getData`);
                    const data = await response.json();
                    if (data.products && data.products.length > 0) setProducts(data.products);
                    if (data.banners && data.banners.length > 0) setBanners(data.banners);
                } catch (err) {
                    console.error("Failed to fetch from sheets, using defaults.", err);
                } finally {
                    setLoadingData(false);
                }
                };
                fetchData();
            }, []);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const addToCart = (product) => {
                setCart(prev => {
                const exists = prev.find(item => item.id === product.id);
                if (exists) {
                    return prev.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item);
                }
                return [...prev, { ...product, qty: 1 }];
                });
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const cartCount = cart.reduce((sum, item) => sum + item.qty, 0);

            const navigate = (newView) => {
                setView(newView);
                setIsMenuOpen(false);
                window.scrollTo(0, 0);
            };

            return (
                <div className="min-h-screen">
                {/* Navigation */}
                <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-zinc-950/90 backdrop-blur-md border-b border-pink-500/20 py-3' : 'bg-transparent py-5'}`}>
                    <div className="container mx-auto px-4 md:px-8 flex justify-between items-center">
                    <div className="flex items-center gap-4">
                        <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="md:hidden text-pink-400 hover:text-pink-300">
                        {isMenuOpen ? <X size={24} /> : <Menu size={24} />}
                        </button>
                        <h1 onClick={() => navigate('home')} className="text-2xl font-bold tracking-tighter cursor-pointer text-white">
                        mgwe's <span className="text-pink-500">collections</span>
                        </h1>
                    </div>

                    <div className="hidden md:flex items-center gap-8 font-medium">
                        <button onClick={() => navigate('men')} className={`hover:text-pink-400 transition-colors ${view === 'men' ? 'text-pink-500' : 'text-gray-300'}`}>Men Wears</button>
                        <button onClick={() => navigate('women')} className={`hover:text-pink-400 transition-colors ${view === 'women' ? 'text-pink-500' : 'text-gray-300'}`}>Women Wears</button>
                        <button onClick={() => navigate('tailor')} className={`flex items-center gap-2 px-4 py-2 rounded-full bg-pink-600/10 text-pink-400 hover:bg-pink-600 hover:text-white transition-all border border-pink-500/30 ${view === 'tailor' ? 'bg-pink-600 text-white' : ''}`}>
                        <Scissors size={16} /> Customized by Tailor
                        </button>
                    </div>

                    <div className="flex items-center gap-4">
                        <button onClick={() => navigate('cart')} className="relative p-2 text-pink-400 hover:text-pink-300 transition-colors">
                        <ShoppingBag size={24} />
                        {cartCount > 0 && (
                            <span className="absolute top-0 right-0 bg-pink-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">
                            {cartCount}
                            </span>
                        )}
                        </button>
                    </div>
                    </div>

                    {/* Mobile Menu */}
                    {isMenuOpen && (
                    <div className="md:hidden absolute top-full left-0 w-full bg-zinc-900 border-b border-pink-500/20 py-4 px-4 flex flex-col gap-4 shadow-2xl">
                        <button onClick={() => navigate('men')} className="text-left text-lg text-gray-200 hover:text-pink-400">Men Wears</button>
                        <button onClick={() => navigate('women')} className="text-left text-lg text-gray-200 hover:text-pink-400">Women Wears</button>
                        <button onClick={() => navigate('tailor')} className="flex items-center gap-2 text-left text-lg text-pink-400 font-medium">
                        <Scissors size={20} /> Customized by Tailor
                        </button>
                    </div>
                    )}
                </nav>

                {/* Main Content Area */}
                <main className="pt-24 pb-20 container mx-auto px-4 md:px-8">
                    {view === 'home' && <HomeView banners={banners} products={products} navigate={navigate} addToCart={addToCart} />}
                    {view === 'men' && <CategoryView title="Men Wears" products={products.filter(p => p.category === 'Men Wears')} addToCart={addToCart} />}
                    {view === 'women' && <CategoryView title="Women Wears" products={products.filter(p => p.category === 'Women Wears')} addToCart={addToCart} />}
                    {view === 'cart' && <CartView cart={cart} setCart={setCart} total={cartTotal} navigate={navigate} />}
                    {view === 'checkout' && <CheckoutView cart={cart} total={cartTotal} navigate={navigate} setCart={setCart} />}
                    {view === 'tailor' && <TailorView navigate={navigate} />}
                    {view === 'success' && (
                    <div className="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-6">
                        <CheckCircle size={80} className="text-pink-500" />
                        <h2 className="text-4xl font-bold">Order Received!</h2>
                        <p className="text-gray-400 max-w-md">Thank you for shopping with mgwe's collections. We have received your order details and will contact you shortly.</p>
                        <button onClick={() => navigate('home')} className="mt-8 bg-pink-600 text-white px-8 py-3 rounded-full hover:bg-pink-700 transition-colors font-medium">
                        Continue Shopping
                        </button>
                    </div>
                    )}
                </main>

                {/* Footer */}
                <footer className="bg-black border-t border-zinc-900 py-12 mt-20">
                    <div className="container mx-auto px-4 md:px-8 grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div>
                        <h3 className="text-xl font-bold mb-4">mgwe's <span className="text-pink-500">collections</span></h3>
                        <p className="text-gray-500">Modern elegance meets custom tailoring. Redefining style in black and pink.</p>
                    </div>
                    <div>
                        <h4 className="font-bold mb-4 text-gray-300">Quick Links</h4>
                        <div className="flex flex-col gap-2 text-gray-500">
                        <button onClick={() => navigate('men')} className="text-left hover:text-pink-500">Men Wears</button>
                        <button onClick={() => navigate('women')} className="text-left hover:text-pink-500">Women Wears</button>
                        <button onClick={() => navigate('tailor')} className="text-left hover:text-pink-500">Custom Tailor</button>
                        </div>
                    </div>
                    <div>
                        <h4 className="font-bold mb-4 text-gray-300">Contact</h4>
                        <p className="text-gray-500">Yangon, Myanmar</p>
                        <p className="text-gray-500">support@mgwecollections.com</p>
                    </div>
                    </div>
                </footer>
                </div>
            );
        }

        // ==========================================
        // VIEWS
        // ==========================================

        function HomeView({ banners, products, navigate, addToCart }) {
            const featured = products.slice(0, 4);
            const heroBanner = banners[0] || { text: "Discover Your Style", subtext: "Exclusive Collections" };

            return (
                <div className="space-y-20 animate-fade-in">
                {/* Hero Section */}
                <div className="relative h-[60vh] md:h-[70vh] rounded-3xl overflow-hidden flex items-center justify-center bg-zinc-900 border border-zinc-800">
                    <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=2000&q=80')] bg-cover bg-center opacity-40 mix-blend-luminosity"></div>
                    <div className="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/60 to-transparent"></div>
                    <div className="relative z-10 text-center px-4 max-w-3xl mx-auto">
                    <span className="text-pink-500 font-semibold tracking-wider uppercase text-sm mb-4 block">New Arrivals</span>
                    <h2 className="text-5xl md:text-7xl font-bold mb-6 tracking-tight leading-tight">{heroBanner.text}</h2>
                    <p className="text-xl md:text-2xl text-gray-300 mb-10 font-light">{heroBanner.subtext}</p>
                    <div className="flex flex-col sm:flex-row gap-4 justify-center">
                        <button onClick={() => navigate('women')} className="bg-pink-600 text-white px-8 py-4 rounded-full font-medium hover:bg-pink-700 transition-colors shadow-lg shadow-pink-600/20">
                        Shop Women
                        </button>
                        <button onClick={() => navigate('men')} className="bg-zinc-800 text-white px-8 py-4 rounded-full font-medium hover:bg-zinc-700 transition-colors border border-zinc-700">
                        Shop Men
                        </button>
                    </div>
                    </div>
                </div>

                {/* Tailor Promo */}
                <div className="bg-gradient-to-r from-pink-900/40 to-black border border-pink-500/20 rounded-3xl p-8 md:p-12 flex flex-col md:flex-row items-center justify-between gap-8">
                    <div>
                    <h3 className="text-3xl font-bold mb-4 flex items-center gap-3"><Scissors className="text-pink-500" /> Customized by Tailor</h3>
                    <p className="text-gray-300 max-w-xl text-lg">Have a specific design in mind? Chat with our AI Design Consultant, share your measurements, and get custom-tailored outfits crafted just for you.</p>
                    </div>
                    <button onClick={() => navigate('tailor')} className="shrink-0 bg-white text-black px-8 py-4 rounded-full font-bold hover:bg-gray-200 transition-colors flex items-center gap-2">
                    Start Consulting <ChevronRight size={20} />
                    </button>
                </div>

                {/* Featured Products */}
                <div>
                    <div className="flex justify-between items-end mb-8">
                    <h3 className="text-3xl font-bold">Featured <span className="text-pink-500">Items</span></h3>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    {featured.map(product => (
                        <ProductCard key={product.id} product={product} onAdd={addToCart} />
                    ))}
                    </div>
                </div>
                </div>
            );
        }

        function CategoryView({ title, products, addToCart }) {
            return (
                <div className="animate-fade-in">
                <div className="mb-12 border-b border-zinc-800 pb-6">
                    <h2 className="text-4xl font-bold">{title}</h2>
                    <p className="text-gray-400 mt-2">Explore our curated collection of premium attire.</p>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                    {products.map(product => (
                    <ProductCard key={product.id} product={product} onAdd={addToCart} />
                    ))}
                </div>
                </div>
            );
        }

        function ProductCard({ product, onAdd }) {
            return (
                <div className="group rounded-2xl bg-zinc-900 border border-zinc-800 overflow-hidden hover:border-pink-500/50 transition-all hover:shadow-xl hover:shadow-pink-900/10 flex flex-col">
                <div className="relative aspect-[4/5] overflow-hidden bg-zinc-800">
                    <img src={product.image} alt={product.name} className="w-full h-full object-cover object-center group-hover:scale-105 transition-transform duration-500 mix-blend-luminosity hover:mix-blend-normal" />
                </div>
                <div className="p-5 flex flex-col flex-grow">
                    <div className="text-xs text-pink-500 font-medium mb-1 uppercase tracking-wider">{product.category}</div>
                    <h4 className="text-lg font-semibold mb-2 flex-grow">{product.name}</h4>
                    <div className="flex items-center justify-between mt-4">
                    <span className="text-xl font-bold">{FORMAT_PRICE(product.price)}</span>
                    <button 
                        onClick={() => onAdd(product)}
                        className="w-10 h-10 rounded-full bg-pink-600/10 text-pink-500 flex items-center justify-center hover:bg-pink-600 hover:text-white transition-colors"
                    >
                        <ShoppingBag size={18} />
                    </button>
                    </div>
                </div>
                </div>
            );
        }

        function CartView({ cart, setCart, total, navigate }) {
            if (cart.length === 0) {
                return (
                <div className="flex flex-col items-center justify-center py-20 text-center animate-fade-in">
                    <ShoppingBag size={80} className="text-zinc-800 mb-6" />
                    <h2 className="text-3xl font-bold mb-4">Your cart is empty</h2>
                    <p className="text-gray-500 mb-8">Looks like you haven't added anything yet.</p>
                    <button onClick={() => navigate('home')} className="bg-pink-600 text-white px-8 py-3 rounded-full hover:bg-pink-700 transition-colors font-medium">
                    Start Shopping
                    </button>
                </div>
                );
            }

            return (
                <div className="max-w-4xl mx-auto animate-fade-in">
                <button onClick={() => navigate('home')} className="flex items-center gap-2 text-gray-400 hover:text-pink-500 transition-colors mb-8 group">
                    <ArrowLeft size={20} className="group-hover:-translate-x-1 transition-transform" /> Back to Shopping
                </button>

                <h2 className="text-3xl font-bold mb-8">Shopping Cart</h2>
                
                <div className="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-xl">
                    <div className="p-6 md:p-8 space-y-6">
                    {cart.map((item, index) => (
                        <div key={index} className="flex flex-col sm:flex-row items-center gap-6 pb-6 border-b border-zinc-800 last:border-0 last:pb-0">
                        <img src={item.image} alt={item.name} className="w-24 h-24 rounded-xl object-cover grayscale mix-blend-luminosity" />
                        <div className="flex-grow text-center sm:text-left">
                            <h4 className="text-lg font-semibold">{item.name}</h4>
                            <p className="text-sm text-gray-500 mb-2">{item.category}</p>
                            <div className="flex items-center justify-center sm:justify-start gap-4">
                            <span className="text-pink-500 font-bold">{FORMAT_PRICE(item.price)}</span>
                            <span className="text-gray-600">x</span>
                            <span className="font-bold bg-zinc-800 px-3 py-1 rounded-md">{item.qty}</span>
                            </div>
                        </div>
                        <button 
                            onClick={() => setCart(cart.filter(i => i.id !== item.id))}
                            className="text-gray-500 hover:text-red-500 p-2"
                        >
                            <X size={20} />
                        </button>
                        </div>
                    ))}
                    </div>
                    
                    <div className="bg-zinc-950 p-6 md:p-8 border-t border-zinc-800 flex flex-col md:flex-row items-center justify-between gap-6">
                    <div>
                        <p className="text-gray-400 mb-1">Total Amount</p>
                        <p className="text-3xl font-bold text-pink-500">{FORMAT_PRICE(total)}</p>
                    </div>
                    <button onClick={() => navigate('checkout')} className="w-full md:w-auto bg-pink-600 text-white px-10 py-4 rounded-full font-bold hover:bg-pink-700 transition-colors shadow-lg shadow-pink-600/20">
                        Proceed to Checkout
                    </button>
                    </div>
                </div>
                </div>
            );
        }

        function CheckoutView({ cart, total, navigate, setCart }) {
            const [formData, setFormData] = useState({ name: '', phone: '', address: '' });
            const [isSubmitting, setIsSubmitting] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);

                const orderData = {
                type: 'standard_order',
                customer: formData,
                items: cart.map(item => `${item.name} (x${item.qty})`).join(', '),
                total: total,
                date: new Date().toISOString()
                };

                try {
                if (GOOGLE_WEB_APP_URL) {
                    await fetch(GOOGLE_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                    });
                } else {
                    await new Promise(r => setTimeout(r, 1000));
                }
                
                setCart([]);
                navigate('success');
                } catch (error) {
                console.error('Checkout failed', error);
                alert("There was an issue connecting to the server. Please try again.");
                } finally {
                setIsSubmitting(false);
                }
            };

            return (
                <div className="max-w-2xl mx-auto animate-fade-in">
                <button onClick={() => navigate('cart')} className="flex items-center gap-2 text-gray-400 hover:text-pink-500 transition-colors mb-8 group">
                    <ArrowLeft size={20} className="group-hover:-translate-x-1 transition-transform" /> Back to Cart
                </button>

                <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 md:p-10 shadow-xl">
                    <h2 className="text-3xl font-bold mb-2">Checkout</h2>
                    <p className="text-gray-400 mb-8">Please provide your details to complete the order.</p>

                    <form onSubmit={handleSubmit} className="space-y-6">
                    <div>
                        <label className="block text-sm font-medium text-gray-400 mb-2">Full Name</label>
                        <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500"><User size={18} /></div>
                        <input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-zinc-950 border border-zinc-800 rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-colors" placeholder="Mg Mg" />
                        </div>
                    </div>
                    
                    <div>
                        <label className="block text-sm font-medium text-gray-400 mb-2">Phone Number</label>
                        <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500"><Phone size={18} /></div>
                        <input required type="tel" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} className="w-full bg-zinc-950 border border-zinc-800 rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-colors" placeholder="09xxxxxxxxx" />
                        </div>
                    </div>

                    <div>
                        <label className="block text-sm font-medium text-gray-400 mb-2">Delivery Address</label>
                        <div className="relative">
                        <div className="absolute top-3 left-0 pl-4 pointer-events-none text-gray-500"><MapPin size={18} /></div>
                        <textarea required rows={3} value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} className="w-full bg-zinc-950 border border-zinc-800 rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-colors resize-none" placeholder="No. 123, Bogyoke Road, Yangon..." />
                        </div>
                    </div>

                    <div className="pt-6 border-t border-zinc-800 flex justify-between items-center">
                        <div>
                        <p className="text-sm text-gray-400">Total to pay</p>
                        <p className="text-2xl font-bold text-pink-500">{FORMAT_PRICE(total)}</p>
                        </div>
                        <button disabled={isSubmitting} type="submit" className="bg-pink-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-pink-700 transition-colors shadow-lg shadow-pink-600/20 disabled:opacity-50 flex items-center gap-2">
                        {isSubmitting ? 'Processing...' : 'Confirm Order'}
                        </button>
                    </div>
                    </form>
                </div>
                </div>
            );
        }

        // --- AI Tailor Consultant System ---
        const TAILOR_SAMPLES = {
            suit: [
                { id: 't1', name: 'Charcoal Slim Fit Suit', price: 200000, image: 'https://images.unsplash.com/photo-1594938298596-70f56fb3ce9b?auto=format&fit=crop&w=400&q=80' },
                { id: 't2', name: 'Navy Double Breasted', price: 220000, image: 'https://images.unsplash.com/photo-1598808503746-f34c53b9323e?auto=format&fit=crop&w=400&q=80' }
            ],
            dress: [
                { id: 't3', name: 'Silk Slip Dress', price: 150000, image: 'https://images.unsplash.com/photo-1572804013309-59a88b7e92f1?auto=format&fit=crop&w=400&q=80' },
                { id: 't4', name: 'Velvet Evening Gown', price: 280000, image: 'https://images.unsplash.com/photo-1566150905458-1bf1fc113f0d?auto=format&fit=crop&w=400&q=80' }
            ],
            shirt: [
                { id: 't5', name: 'Custom Linen Shirt', price: 60000, image: 'https://images.unsplash.com/photo-1596755094514-f87e34085b2c?auto=format&fit=crop&w=400&q=80' }
            ]
        };

        function TailorView({ navigate }) {
            const [messages, setMessages] = useState([
                { role: 'bot', text: 'Hello! I am your AI Design Consultant. What kind of custom clothing are you looking for today? (e.g., suit, dress, shirt)' }
            ]);
            const [input, setInput] = useState('');
            const [selectedItem, setSelectedItem] = useState(null);
            const [measurements, setMeasurements] = useState({ height: '', chest: '', waist: '', hips: '' });
            const [customerInfo, setCustomerInfo] = useState({ name: '', phone: '' });
            const [step, setStep] = useState('chat'); // chat, measure, info, success
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, step]);

            const handleSend = () => {
                if (!input.trim()) return;
                
                const userMsg = input.trim().toLowerCase();
                setMessages(prev => [...prev, { role: 'user', text: input }]);
                setInput('');

                setTimeout(() => {
                let foundCategory = null;
                if (userMsg.includes('suit')) foundCategory = 'suit';
                else if (userMsg.includes('dress')) foundCategory = 'dress';
                else if (userMsg.includes('shirt')) foundCategory = 'shirt';

                if (foundCategory) {
                    setMessages(prev => [...prev, { 
                    role: 'bot', 
                    text: `Great choice! Here are some sample ${foundCategory} designs we can customize for you. Click on one you like to proceed with measurements:`,
                    samples: TAILOR_SAMPLES[foundCategory]
                    }]);
                } else {
                    setMessages(prev => [...prev, { 
                    role: 'bot', 
                    text: "I specialize in custom suits, dresses, and shirts right now. Could you specify one of those?" 
                    }]);
                }
                }, 600);
            };

            const handleSelectSample = (sample) => {
                setSelectedItem(sample);
                setStep('measure');
            };

            const submitMeasurements = async () => {
                setStep('info');
            };

            const finalizeCustomOrder = async () => {
                const customOrderData = {
                type: 'custom_tailor',
                customer: customerInfo,
                item: selectedItem.name,
                basePrice: selectedItem.price,
                measurements: measurements,
                date: new Date().toISOString()
                };

                try {
                if (GOOGLE_WEB_APP_URL) {
                    await fetch(GOOGLE_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(customOrderData)
                    });
                } else {
                    await new Promise(r => setTimeout(r, 1000));
                }
                setStep('success');
                } catch (error) {
                console.error('Failed to submit custom order', error);
                alert("Error submitting request.");
                }
            };

            return (
                <div className="max-w-3xl mx-auto h-[80vh] flex flex-col bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl animate-fade-in">
                {/* Header */}
                <div className="bg-zinc-950 p-4 border-b border-pink-500/20 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                    <div className="w-10 h-10 rounded-full bg-pink-600 flex items-center justify-center text-white">
                        <MessageSquare size={20} />
                    </div>
                    <div>
                        <h3 className="font-bold text-white">AI Design Consultant</h3>
                        <p className="text-xs text-pink-400">Online | mgwe's Custom Studio</p>
                    </div>
                    </div>
                    <button onClick={() => navigate('home')} className="text-gray-500 hover:text-white"><X size={24}/></button>
                </div>

                {/* Dynamic Content Area */}
                <div className="flex-grow overflow-y-auto p-4 md:p-6 space-y-6 custom-scrollbar bg-zinc-900/50">
                    
                    {step === 'chat' && messages.map((msg, idx) => (
                    <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                        <div className={`max-w-[80%] rounded-2xl p-4 ${msg.role === 'user' ? 'bg-pink-600 text-white rounded-br-none' : 'bg-zinc-800 text-gray-200 rounded-bl-none border border-zinc-700'}`}>
                        <p>{msg.text}</p>
                        
                        {msg.samples && (
                            <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
                            {msg.samples.map(sample => (
                                <div key={sample.id} onClick={() => handleSelectSample(sample)} className="bg-zinc-950 rounded-xl overflow-hidden cursor-pointer hover:border-pink-500 border border-zinc-800 transition-all group">
                                <img src={sample.image} alt={sample.name} className="w-full h-32 object-cover grayscale mix-blend-luminosity group-hover:mix-blend-normal transition-all" />
                                <div className="p-3">
                                    <p className="text-sm font-semibold truncate">{sample.name}</p>
                                    <p className="text-pink-500 text-xs font-bold">{FORMAT_PRICE(sample.price)}</p>
                                </div>
                                </div>
                            ))}
                            </div>
                        )}
                        </div>
                    </div>
                    ))}

                    {step === 'measure' && (
                    <div className="bg-zinc-800 border border-pink-500/30 rounded-2xl p-6 animate-fade-in">
                        <div className="flex items-center gap-4 mb-6 pb-4 border-b border-zinc-700">
                        <img src={selectedItem.image} className="w-16 h-16 rounded-lg object-cover" alt="Selected" />
                        <div>
                            <p className="text-sm text-gray-400">Selected Design</p>
                            <p className="font-bold text-lg">{selectedItem.name}</p>
                        </div>
                        </div>
                        <h4 className="text-xl font-bold mb-4 text-pink-400">Your Body Measurements</h4>
                        <p className="text-sm text-gray-400 mb-6">Please provide measurements in inches (in) or centimeters (cm).</p>
                        
                        <div className="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label className="text-xs text-gray-400">Height</label>
                            <input type="text" value={measurements.height} onChange={e=>setMeasurements({...measurements, height: e.target.value})} className="w-full bg-zinc-900 border border-zinc-700 rounded-lg p-2 text-white focus:border-pink-500 outline-none mt-1" placeholder="e.g. 170cm" />
                        </div>
                        <div>
                            <label className="text-xs text-gray-400">Chest/Bust</label>
                            <input type="text" value={measurements.chest} onChange={e=>setMeasurements({...measurements, chest: e.target.value})} className="w-full bg-zinc-900 border border-zinc-700 rounded-lg p-2 text-white focus:border-pink-500 outline-none mt-1" placeholder="e.g. 38in" />
                        </div>
                        <div>
                            <label className="text-xs text-gray-400">Waist</label>
                            <input type="text" value={measurements.waist} onChange={e=>setMeasurements({...measurements, waist: e.target.value})} className="w-full bg-zinc-900 border border-zinc-700 rounded-lg p-2 text-white focus:border-pink-500 outline-none mt-1" placeholder="e.g. 32in" />
                        </div>
                        <div>
                            <label className="text-xs text-gray-400">Hips</label>
                            <input type="text" value={measurements.hips} onChange={e=>setMeasurements({...measurements, hips: e.target.value})} className="w-full bg-zinc-900 border border-zinc-700 rounded-lg p-2 text-white focus:border-pink-500 outline-none mt-1" placeholder="e.g. 40in" />
                        </div>
                        </div>
                        
                        <div className="flex gap-3">
                        <button onClick={() => setStep('chat')} className="flex-1 py-3 rounded-xl border border-zinc-600 hover:bg-zinc-700 transition">Back</button>
                        <button onClick={submitMeasurements} className="flex-1 py-3 rounded-xl bg-pink-600 text-white font-bold hover:bg-pink-700 transition">Continue</button>
                        </div>
                    </div>
                    )}

                    {step === 'info' && (
                    <div className="bg-zinc-800 border border-pink-500/30 rounded-2xl p-6 animate-fade-in">
                        <h4 className="text-xl font-bold mb-4 text-pink-400">Contact Details</h4>
                        <p className="text-sm text-gray-400 mb-6">How should our master tailor contact you?</p>
                        
                        <div className="space-y-4 mb-6">
                        <div>
                            <label className="text-xs text-gray-400">Name</label>
                            <input type="text" value={customerInfo.name} onChange={e=>setCustomerInfo({...customerInfo, name: e.target.value})} className="w-full bg-zinc-900 border border-zinc-700 rounded-lg p-3 text-white focus:border-pink-500 outline-none mt-1" />
                        </div>
                        <div>
                            <label className="text-xs text-gray-400">Phone Number</label>
                            <input type="text" value={customerInfo.phone} onChange={e=>setCustomerInfo({...customerInfo, phone: e.target.value})} className="w-full bg-zinc-900 border border-zinc-700 rounded-lg p-3 text-white focus:border-pink-500 outline-none mt-1" />
                        </div>
                        </div>
                        
                        <button onClick={finalizeCustomOrder} className="w-full py-4 rounded-xl bg-pink-600 text-white font-bold hover:bg-pink-700 transition shadow-lg shadow-pink-600/20">
                        Submit Custom Order
                        </button>
                    </div>
                    )}

                    {step === 'success' && (
                    <div className="flex flex-col items-center justify-center text-center h-full space-y-4 animate-fade-in">
                        <CheckCircle size={60} className="text-pink-500" />
                        <h3 className="text-2xl font-bold">Request Sent!</h3>
                        <p className="text-gray-400 max-w-sm">Our tailor has received your measurements for the {selectedItem.name}. We will call you at {customerInfo.phone} to confirm fabrics and timeline.</p>
                        <button onClick={() => navigate('home')} className="mt-4 px-6 py-2 bg-zinc-800 rounded-full hover:bg-zinc-700">Back to Home</button>
                    </div>
                    )}
                    
                    <div ref={chatEndRef} />
                </div>

                {/* Input Area */}
                {step === 'chat' && (
                    <div className="p-4 bg-zinc-950 border-t border-zinc-800">
                    <div className="flex items-center gap-2">
                        <input 
                        type="text" 
                        value={input}
                        onChange={(e) => setInput(e.target.value)}
                        onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                        placeholder="e.g., I want a black suit..."
                        className="flex-grow bg-zinc-900 border border-zinc-700 rounded-full py-3 px-5 text-white focus:outline-none focus:border-pink-500"
                        />
                        <button onClick={handleSend} className="w-12 h-12 rounded-full bg-pink-600 flex items-center justify-center text-white hover:bg-pink-700 transition-colors shrink-0">
                        <Send size={18} />
                        </button>
                    </div>
                    </div>
                )}
                </div>
            );
        }

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
